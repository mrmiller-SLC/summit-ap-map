<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit AP Region Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --red: #CD0A1B;
    --carbon: #221F1F;
    --light-gray: #f4f4f4;
    --mid-gray: #e0e0e0;
    --white: #ffffff;
    --font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--light-gray);
    min-height: 100vh;
    padding: 20px;
  }
  .page-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .page-header .logo-bar {
    width: 6px; height: 36px;
    background: var(--red);
    border-radius: 3px;
  }
  .page-header h1 {
    font-size: 1.4rem; font-weight: 700;
    color: var(--carbon);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .page-header p { font-size: 0.78rem; color: #666; margin-top: 2px; }

  /* Map constrained to 50% width */
  .map-wrapper {
    margin-bottom: 16px;
  }

  .map-container {
    position: relative;
    display: inline-block;
    width: 50%;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  .map-container img {
    width: 100%;
    display: block;
  }

  /* Overlay panel sitting top-right inside the map image */
  .map-overlay-panel {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 3;
  }

  .overlay-card {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(34, 31, 31, 0.82);
    border-left: 3px solid var(--red);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s;
    backdrop-filter: blur(4px);
    min-width: 150px;
  }

  .overlay-card:hover {
    background: rgba(205, 10, 27, 0.88);
    transform: translateX(-2px);
  }

  .oc-icon {
    font-size: 0.65rem;
    font-weight: 800;
    color: white;
    background: var(--red);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .overlay-card:hover .oc-icon {
    background: white;
    color: var(--red);
  }

  .oc-text strong {
    display: block;
    font-size: 0.75rem;
    color: white;
    font-weight: 700;
    line-height: 1.2;
  }

  .oc-text span {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.7);
  }

  .region-btn {
    position: absolute;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.18s;
    z-index: 2;
  }
  .region-btn:hover {
    background: rgba(205, 10, 27, 0.22);
    outline: 2px solid var(--red);
  }

  /* Side region cards */
  .side-regions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .side-card {
    background: var(--white);
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 14px 20px;
    flex: 1;
    min-width: 160px;
    cursor: pointer;
    border-left: 5px solid var(--red);
    transition: box-shadow 0.18s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .side-card:hover {
    box-shadow: 0 4px 18px rgba(205,10,27,0.18);
    transform: translateY(-2px);
  }
  .side-card .sc-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.72rem;
    flex-shrink: 0; letter-spacing: 0.02em;
  }
  .side-card .sc-text strong { display: block; font-size: 0.82rem; color: var(--carbon); font-weight: 700; }
  .side-card .sc-text span { font-size: 0.72rem; color: #777; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(34,31,31,0.55);
    z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 12px;
    width: 92%; max-width: 480px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    overflow: hidden;
    animation: modalIn 0.22s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.93) translateY(12px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal-header {
    background: var(--red);
    padding: 18px 22px 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-header .region-tag {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.75); margin-bottom: 4px;
  }
  .modal-header h2 { color: var(--white); font-size: 1.05rem; font-weight: 700; line-height: 1.2; }
  .modal-close {
    background: rgba(255,255,255,0.2); border: none; color: white;
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-left: 12px; transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.35); }
  .modal-body { padding: 20px 22px; }
  .contact-card {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--mid-gray);
  }
  .contact-card:last-child { border-bottom: none; }
  .contact-avatar {
    width: 60px; height: 60px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 1rem;
    flex-shrink: 0; border: 3px solid #e0e0e0;
  }
  .contact-info strong { display: block; font-size: 0.95rem; color: var(--carbon); font-weight: 700; }
  .contact-info .title { font-size: 0.75rem; color: #888; margin-bottom: 8px; }
  .contact-info a.email-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.78rem; color: var(--red); text-decoration: none;
    font-weight: 600; border: 1.5px solid var(--red);
    border-radius: 20px; padding: 4px 12px;
    transition: background 0.15s, color 0.15s;
  }
  .contact-info a.email-link:hover { background: var(--red); color: white; }
</style>
</head>
<body>

<div class="page-header">
  <div class="logo-bar"></div>
  <div>
    <h1>AP Team — Regional Contacts</h1>
    <p>Click a region to view your Accounts Payable contact</p>
  </div>
</div>

<div class="map-wrapper">
  <div class="map-container" id="mapContainer">
    <img src="Regional%20Map%20and%20Leadership_1.jpg" alt="Summit Line Regional Map" id="mapImg" onload="positionButtons()">
    <button class="region-btn" id="rb-1"  onclick="openModal('r1')"  title="Region 1"></button>
    <button class="region-btn" id="rb-7"  onclick="openModal('r7')"  title="Region 7"></button>
    <button class="region-btn" id="rb-15" onclick="openModal('r15')" title="Region 15"></button>
    <button class="region-btn" id="rb-14" onclick="openModal('r14')" title="Region 14"></button>
    <button class="region-btn" id="rb-9"  onclick="openModal('r9')"  title="Region 9"></button>
    <button class="region-btn" id="rb-10" onclick="openModal('r10')" title="Region 10"></button>

    <!-- Overlay panel top-right on the image -->
    <div class="map-overlay-panel">
      <div class="overlay-card" onclick="openModal('r12')">
        <div class="oc-icon">R12</div>
        <div class="oc-text"><strong>Region 12</strong><span>Major Projects</span></div>
      </div>
      <div class="overlay-card" onclick="openModal('r20')">
        <div class="oc-icon">R20</div>
        <div class="oc-text"><strong>Region 20</strong><span>Foundations</span></div>
      </div>
      <div class="overlay-card" onclick="openModal('r30')">
        <div class="oc-icon">R30</div>
        <div class="oc-text"><strong>Region 30</strong><span>Data Centers</span></div>
      </div>
      <div class="overlay-card" onclick="openModal('r90')">
        <div class="oc-icon">R90</div>
        <div class="oc-text"><strong>Region 90</strong><span>All Regions</span></div>
      </div>
      <div class="overlay-card" onclick="openModal('exec')">
        <div class="oc-icon">EX</div>
        <div class="oc-text"><strong>Executive</strong><span>Leadership</span></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="region-tag" id="modalTag"></div>
        <h2 id="modalTitle"></h2>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

    return `<img class="contact-avatar" src="${src}" alt="${p.name}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;object-position:center top;flex-shrink:0;border:3px solid #e0e0e0;">`;
  }
  return `<div class="contact-avatar" style="background:${p.color};width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:1rem;flex-shrink:0;">${p.initials}</div>`;
}

function emailBtnHTML(email) {
  if (!email) return `<span style="font-size:0.75rem;color:#aaa;font-style:italic;">Contact pending — new hire</span>`;
  return `<a class="email-link" href="mailto:${email}">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
    ${email}
  </a>`;
}

function openModal(regionKey) {
  const r = regions[regionKey];
  if (!r) return;
  document.getElementById('modalTag').textContent = r.tag;
  document.getElementById('modalTitle').textContent = r.title;
  let html = '';
  r.contacts.forEach(key => {
    const p = people[key];
    html += `<div class="contact-card">${avatarHTML(p)}<div class="contact-info"><strong>${p.name}</strong><div class="title">${p.title}</div>${emailBtnHTML(p.email)}</div></div>`;
  });
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// Hotspot positions as % of rendered image size
// Based on new square map image layout
const regionPositions = {
  'rb-1':  { top: 30, left: 38, width:  8, height: 10 },
  'rb-7':  { top: 50, left:  7, width:  8, height: 10 },
  'rb-15': { top: 46, left: 24, width:  8, height: 10 },
  'rb-14': { top: 59, left: 26, width:  8, height: 10 },
  'rb-9':  { top: 72, left: 36, width:  8, height: 10 },
  'rb-10': { top: 78, left: 62, width:  8, height: 10 },
};

function positionButtons() {
  const container = document.getElementById('mapContainer');
  const img = document.getElementById('mapImg');
  const h = img.offsetHeight;
  const w = img.offsetWidth;
  Object.entries(regionPositions).forEach(([id, pos]) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.style.top    = (pos.top    / 100 * h) + 'px';
    btn.style.left   = (pos.left   / 100 * w) + 'px';
    btn.style.width  = (pos.width  / 100 * w) + 'px';
    btn.style.height = (pos.height / 100 * h) + 'px';
  });
}
window.addEventListener('resize', positionButtons);
</script>
</body>
